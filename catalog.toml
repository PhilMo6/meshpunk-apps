# Meshpunk App Library catalog — the single source of truth.
# An app/theme only appears on devices when it has an entry here; files in the
# repo without a catalog entry are invisible. See README.md for the field
# reference.
#
# `name` doubles as the on-device install folder — for apps that ship
# preinstalled in firmware it MUST match the firmware folder name exactly
# (case-sensitive) or installed-state tracking breaks.
#
# Preinstalled content ships with a .version marker at these same versions;
# bumping a version here (with updated files) offers the update on-device.
#
# Optional per-entry `min_fw` (integer): the minimum firmware API level
# (_FW_API, src/version.h in the firmware repo) the entry's files need.
# Devices below it show "Needs FW" instead of Install/Update. Omit it for
# content that runs on any firmware. App Library builds older than 1.0.1
# ignore the field — until those age out, only publish gated entries when
# the mismatch degrades gracefully. NEVER put min_fw on App_Library itself:
# that update is what brings gating to old-firmware devices.

[meta]
version = 1
updated = "2026-07-19"

