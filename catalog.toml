# ── USB drivers ──────────────────────────────────────────────────────────────
# Dynamic .drv.elf modules for the USB host. Files download from
# drivers/<id>/ and install into usb_drivers/<id>/ on L: (flash) or S: (SD);
# the running firmware loads a matching driver at device attach — no restart.
# `id` IS the install folder and MUST match what the driver/app expect
# (e.g. the Gamepad app looks in usb_drivers/gamepad). Every driver needs
# min_fw = 2 (the dynamic-driver firmware). Managed on-device from
# Tools > USB > "USB drivers..."; an app's `drivers = ["<id>"]` auto-installs
# the driver right after the app.

[[drivers]]
id = "gamepad"
name = "gamepad"
author = "PhilMo6"
version = "1.0.0"
min_fw = 2
description = "USB HID gamepad — descriptor-driven, mappable to T-Deck inputs"
files = ["gamepad.drv.elf", "match"]

[[drivers]]
id = "mouse"
name = "mouse"
author = "PhilMo6"
version = "1.0.0"
min_fw = 2
description = "USB HID mouse — moves focus, left-click selects"
files = ["mouse.drv.elf", "match"]

[[drivers]]
id = "tdeck"
name = "tdeck"
author = "PhilMo6"
version = "1.0.0"
min_fw = 2
description = "T-Deck to T-Deck peer link over USB (GameBoy link cable)"
files = ["tdeck.drv.elf", "match"]
